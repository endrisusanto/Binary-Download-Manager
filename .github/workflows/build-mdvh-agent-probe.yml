name: Build MDVH Agent Probe

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  windows-probe:
    name: Windows mdvh-agent-probe
    runs-on: windows-latest
    if: "${{ github.event_name != 'push' || startsWith(github.ref, 'refs/tags/') || !contains(github.event.head_commit.message, 'chore: release') }}"
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run tests
        run: cargo test --workspace

      - name: Build release
        run: cargo build --release --package mdvh-agent-probe

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Node dependencies
        run: |
          cd tools/mdvh-download-manager
          npm install

      - name: Build Tauri app
        run: |
          cd tools/mdvh-download-manager
          npm run tauri build

      - name: Smoke parse sample workflow
        shell: pwsh
        run: |
          target\release\mdvh-agent-probe.exe `
            --workflow-json fixtures\raonk-workflow\raonk-workflow-sample.json `
            --output-dir downloads `
            --parse-only

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target\release\mdvh-agent-probe.exe dist\mdvh-agent-probe.exe
          Copy-Item README.md dist\README.md
          Copy-Item fixtures\raonk-workflow\raonk-workflow-sample.json dist\raonk-workflow-sample.json
          Copy-Item tools\mdvh-payload-bridge dist\mdvh-payload-bridge -Recurse
          Compress-Archive -Path dist\mdvh-payload-bridge -DestinationPath dist\mdvh-payload-bridge.zip
          
          # Copy Tauri NSIS executable installer
          Copy-Item target\release\bundle\nsis\*.exe dist\

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: mdvh-agent-probe-windows
          path: dist/*
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mdvh-agent-probe.exe
            dist/mdvh-payload-bridge.zip
            dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
